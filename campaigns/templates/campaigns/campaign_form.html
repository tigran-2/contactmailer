{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <h2>Create New Campaign</h2>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">Draft your email campaign and select a target audience.</p>
    
    <form method="POST" style="background: rgba(15, 23, 42, 0.4); padding: 2rem; border-radius: 12px; border: 1px solid var(--surface-border);">
        {% csrf_token %}
        
        <div style="margin-bottom: 1.5rem;">
            {{ form.as_p }}
        </div>
        
        <div style="background: rgba(59, 130, 246, 0.1); border-left: 3px solid var(--accent-primary); padding: 1rem; border-radius: 4px 8px 8px 4px; margin-bottom: 2rem;">
            <p style="font-size: 0.9rem; color: var(--text-primary); margin: 0;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 5px; color: var(--accent-primary);"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                <strong>Pro Tip:</strong> Personalize your email by using placeholders in the body text: 
                <br><br><span style="font-family: monospace; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; color: #93c5fd;">{name}</span>, <span style="font-family: monospace; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; color: #93c5fd;">{email}</span>, <span style="font-family: monospace; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; color: #93c5fd;">{company}</span>, <span style="font-family: monospace; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; color: #93c5fd;">{tags}</span>
            </p>
        </div>
        
        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
            <a href="{% url 'campaigns:campaign_list' %}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Campaign</button>
        </div>
    </form>
</div>
{% endblock %}
