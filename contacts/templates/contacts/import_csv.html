{% extends 'base.html' %}

{% block content %}
<h2>Import Contacts CSV</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}

</form>

<br>
<a href="{% url 'contacts:contact_list' %}">Back to Contacts</a>
{% endblock %}
